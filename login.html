<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmoSense · Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#bbd8ff;--border:#1a2840;--accent:#00e5c0;--accent2:#7b5cfa;--text:#000;--muted:#000;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;min-height:100vh;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;padding:24px 16px;position:relative;}
.bg-canvas{position:fixed;inset:0;overflow:hidden;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.12;animation:drift 18s ease-in-out infinite;}
.orb1{width:500px;height:500px;background:var(--accent2);top:-20%;right:-10%;}
.orb2{width:400px;height:400px;background:var(--accent);bottom:-15%;left:-5%;animation-delay:-9s;}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-25px)}}
.grid-bg{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,229,192,.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,229,192,.025) 1px,transparent 1px);background-size:56px 56px;}
.card{position:relative;z-index:10;width:440px;max-width:100%;
  background:rgb(95 200 225/85%);border:1px solid var(--border);border-radius:24px;
  padding:44px 40px;backdrop-filter:blur(24px);
  box-shadow:0 32px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04);
  animation:slideUp .5s cubic-bezier(.16,1,.3,1) both;}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent2),transparent);}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center;}
.logo-icon{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#fff,#fff);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 8px 24px rgba(123,92,250,.4);}
.logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  background:linear-gradient(90deg,#fff,#fff);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px;text-align:center;}
.sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px;}
.alert-err{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.35);
  border-radius:10px;padding:11px 16px;font-size:13px;color:#cc2200;margin-bottom:20px;
  display:flex;gap:8px;align-items:center;font-weight:600;animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.field{margin-bottom:18px;}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:7px;}
input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:11px;padding:12px 14px;font-size:14px;color:var(--text);
  font-family:'DM Sans',sans-serif;outline:none;transition:all .25s;}
input:focus{border-color:var(--accent2);background:rgba(123,92,250,.08);
  box-shadow:0 0 0 3px rgba(123,92,250,.15);}
input::placeholder{color:rgba(0,0,0,.38);}
.pwd-row{position:relative;}
.pwd-row input{padding-right:46px;}
.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:17px;line-height:1;padding:4px;transition:opacity .2s;}
.pwd-toggle:hover{opacity:.65;}
.field-hint{font-size:11px;color:rgba(0,0,0,.45);margin-top:6px;line-height:1.5;}
.btn-submit{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  background:linear-gradient(135deg,#7560d1,#31534d);color:#fff;margin-top:24px;
  box-shadow:0 8px 24px rgba(123,92,250,.35);transition:all .25s;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(123,92,250,.45);}
.divider{border:none;border-top:1px solid var(--border);margin:28px 0;}
.footer-link{text-align:center;font-size:13px;color:var(--muted);}
.footer-link a{color:#7e367f;text-decoration:none;font-weight:600;}
.footer-link a:hover{text-decoration:underline;}
.input-icon-wrap{position:relative;}
.input-icon-wrap input{padding-left:40px;}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;opacity:.55;}
/* DB status badge */
.db-badge{position:fixed;bottom:12px;right:14px;font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:20px;background:rgba(0,229,192,.15);
  border:1px solid rgba(0,229,192,.3);color:#005a45;z-index:200;}
</style>
</head>
<body>
<div class="bg-canvas"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="grid-bg"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div class="logo-text">EmoSense</div>
  </div>
  <h2>Welcome Back</h2>
  <p class="sub">Sign in with your email address</p>

  {% if error %}
  <div class="alert-err">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login" onsubmit="return validateLogin(event)">
    <div class="field">
      <label>Email Address</label>
      <div class="input-icon-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pwd-row">
        <input type="password" name="password" id="pwd" placeholder="Your password"
               required autocomplete="current-password">
        <button type="button" class="pwd-toggle" onclick="toggleVis()" aria-label="Show/hide password">👁</button>
      </div>
      <p class="field-hint">Letters, numbers &amp; special characters accepted</p>
    </div>
    <button type="submit" class="btn-submit">Sign In →</button>
  </form>

  <hr class="divider">
  <div class="footer-link">Don't have an account? <a href="/register">Create one</a></div>
</div>

<!-- DB connection badge -->
<div class="db-badge" id="db-badge">🗄️ Checking DB…</div>

<script>
function toggleVis(){
  const input=document.getElementById('pwd'),btn=document.querySelector('.pwd-toggle');
  const hide=input.type==='password';
  input.type=hide?'text':'password';btn.textContent=hide?'︶':'👁';
}
function showError(msg){
  const old=document.getElementById('js-err');if(old)old.remove();
  const div=document.createElement('div');div.id='js-err';div.className='alert-err';
  div.innerHTML='⚠️ '+msg;document.querySelector('form').insertAdjacentElement('beforebegin',div);
}
function validateLogin(e){
  const email=document.querySelector('input[name="email"]').value.trim();
  const pwd=document.getElementById('pwd').value;
  if(!email||!email.includes('@')){e.preventDefault();showError('Please enter a valid email address.');return false;}
  if(!pwd||pwd.length<6){e.preventDefault();showError('Password must be at least 6 characters.');return false;}
  return true;
}
// Check DB status
fetch('/api/db_status').then(r=>r.json()).then(d=>{
  const b=document.getElementById('db-badge');
  if(d.status==='connected'){b.textContent='🗄️ MySQL Connected · '+d.users+' users';b.style.background='rgba(0,229,192,.15)';}
  else{b.textContent='⚠️ DB Error';b.style.background='rgba(255,100,100,.15)';b.style.color='#cc2200';}
}).catch(()=>{document.getElementById('db-badge').textContent='⚠️ DB Offline';});
</script>
</body>
</html>
